<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>
        {% block title %}
        Vida Saludable
        {% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
        <div class="container">

            <a class="navbar-brand fw-bold" href="/">
                🥗 Vida Saludable
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/imc">IMC</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/quimica">Química</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/historia">Historia</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="/recetas">
                            Recetas
                        </a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="/ejercicios">
                            Ejercicios
                        </a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="/salud_mental">
                            Salud Mental
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/alumnos">Historial</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link"
                           href="/agregar_receta">
                    
                           Agregar Receta
                    
                        </a>
                    </li>

                </ul>

            </div>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="container py-5">

        {% block content %}
        {% endblock %}

    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center p-3 mt-5">

        <p class="m-0">
            Proyecto PAEC - Vida Saludable 4-D
        </p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
