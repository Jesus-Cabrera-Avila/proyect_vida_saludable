{% extends "layout.html" %}

{% block title %}
Calculadora IMC
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow p-4">

            <h1 class="text-center text-success mb-4">
                📏 Calculadora IMC
            </h1>

            <form method="POST">

                <div class="mb-3">
                    <input type="text"
                           name="nombre"
                           class="form-control"
                           placeholder="Nombre"
                           required>
                </div>

                <div class="mb-3">
                    <select name="sexo"
                            class="form-select"
                            required>

                        <option value="">
                            Selecciona tu sexo
                        </option>

                        <option value="hombre">
                            Hombre
                        </option>

                        <option value="mujer">
                            Mujer
                        </option>

                    </select>
                </div>

                <div class="mb-3">
                    <input type="number"
                           step="0.01"
                           name="peso"
                           class="form-control"
                           placeholder="Peso (kg)"
                           required>
                </div>

                <div class="mb-3">
                    <input type="number"
                           step="0.01"
                           name="estatura"
                           class="form-control"
                           placeholder="Estatura (m)"
                           required>
                </div>

                <div class="d-grid">
                    <button type="submit"
                            class="btn btn-success">

                        Calcular IMC

                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
